<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sweet sorrow — a voice beside you</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; }
  body { position: relative; background: #0a1628; }
  canvas#stream { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; display: block; }
  .overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.35) 100%); pointer-events: none; z-index: 1; transition: background 8s ease; }
  body.playing .overlay { background: linear-gradient(to bottom, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 30%, rgba(255,255,255,0) 70%, rgba(255,230,235,0.28) 100%); }
  .content { position: relative; z-index: 2; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 1.5rem; color: #d8e4ec; transition: color 8s ease; }
  body.playing .content { color: #6b4858; }
  /* Rounder, softer cursive — Caveat / Kalam feel via system fonts */
  h1 {
    font-family: "Kalam", "Caveat", "Comic Sans MS", "Hiragino Maru Gothic ProN", "Yu Gothic", "Bradley Hand", cursive;
    font-size: clamp(2.6rem, 7.5vw, 4.4rem);
    font-weight: 500;
    font-style: normal;
    letter-spacing: 0.02em;
    margin-bottom: 0.6rem;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    color: inherit;
    transition: text-shadow 8s ease;
  }
  body.playing h1 { text-shadow: 0 1px 3px rgba(255,255,255,0.7); }
  .subtitle { font-size: clamp(0.78rem, 2vw, 0.95rem); font-weight: 300; letter-spacing: 0.18em; margin-bottom: 3rem; opacity: 0.7; text-shadow: 0 1px 2px rgba(0,0,0,0.4); font-style: italic; transition: text-shadow 8s ease; }
  body.playing .subtitle { text-shadow: 0 1px 2px rgba(255,255,255,0.6); opacity: 0.75; }
  .buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  button { background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.35); color: #d8e4ec; padding: 0.85rem 2.4rem; font-size: 0.95rem; font-weight: 300; letter-spacing: 0.25em; border-radius: 999px; cursor: pointer; transition: background 0.5s ease, color 8s ease, border-color 8s ease, transform 0.5s ease; font-family: inherit; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2); }
  body.playing button { background: rgba(255, 255, 255, 0.55); border-color: rgba(255, 255, 255, 0.8); color: #6b4858; box-shadow: 0 4px 16px rgba(180, 140, 160, 0.15); }
  button:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }
  body.playing button:hover { background: rgba(255, 255, 255, 0.85); }
  button.hidden { display: none; }
  .whisper { margin-top: 2.5rem; font-size: 0.85rem; letter-spacing: 0.18em; opacity: 0; transition: opacity 1.2s ease, color 8s ease; color: inherit; font-weight: 300; min-height: 1.2em; text-shadow: 0 1px 2px rgba(0,0,0,0.4); font-style: italic; padding: 0 1rem; }
  body.playing .whisper { text-shadow: 0 1px 2px rgba(255,255,255,0.6); }
  .whisper.show { opacity: 0.85; }
  body.playing .content { animation: breathing 6s ease-in-out infinite; }
  @keyframes breathing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
</style>
<!-- Optional: Google Fonts for a clean rounder cursive on devices that support it -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="stream"></canvas>
<div class="overlay"></div>
<div class="content">
  <h1>sweet sorrow</h1>
  <p class="subtitle">a voice beside you, in your quiet hours</p>
  <div class="buttons">
    <button id="listenBtn">Listen</button>
    <button id="stopBtn" class="hidden">Stop</button>
  </div>
  <p class="whisper" id="whisper">　</p>
</div>
<audio id="audio" loop preload="auto" playsinline webkit-playsinline x-webkit-airplay="allow">
  <source src="0505.mp3" type="audio/mpeg">
  <source src="./0505.mp3" type="audio/mpeg">
</audio>
<script>
const canvas = document.getElementById('stream');
const ctx = canvas.getContext('2d');
let W, H, DPR, isPlaying = false, time = 0, flowAmount = 0, colorAmount = 0;

function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

function lerpColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
  const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
  const r = Math.round(r1 + (r2-r1)*t);
  const g = Math.round(g1 + (g2-g1)*t);
  const b = Math.round(b1 + (b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

const darkPalette = ['#0c1829', '#122438', '#1a3050', '#223c62', '#2c4878'];
const pinkPalette = ['#fde8ec', '#fad5dd', '#f5bfca', '#e8a8b8', '#d692a5'];

function drawBase() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, lerpColor(darkPalette[0], pinkPalette[0], colorAmount));
  grad.addColorStop(0.35, lerpColor(darkPalette[1], pinkPalette[1], colorAmount));
  grad.addColorStop(0.55, lerpColor(darkPalette[2], pinkPalette[2], colorAmount));
  grad.addColorStop(0.75, lerpColor(darkPalette[3], pinkPalette[3], colorAmount));
  grad.addColorStop(1, lerpColor(darkPalette[4], pinkPalette[4], colorAmount));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const blob1 = colorAmount < 0.5 ? 'rgba(70,110,180,0.20)' : 'rgba(245,200,210,0.22)';
  const blob2 = colorAmount < 0.5 ? 'rgba(50,90,160,0.16)' : 'rgba(240,190,205,0.20)';
  const blob3 = colorAmount < 0.5 ? 'rgba(40,75,140,0.14)' : 'rgba(230,175,195,0.17)';
  const blob4 = colorAmount < 0.5 ? 'rgba(90,130,200,0.18)' : 'rgba(250,215,225,0.24)';

  // Blobs drift slowly even in idle state — slowed 5x
  const drift = time * 0.000016;
  drawSoftBlob(W*0.2 + Math.sin(drift)*30, H*0.65 + Math.cos(drift*0.7)*15, 280, blob1);
  drawSoftBlob(W*0.75 + Math.cos(drift*0.8)*25, H*0.55 + Math.sin(drift)*12, 320, blob2);
  drawSoftBlob(W*0.5 + Math.sin(drift*1.1)*20, H*0.85 + Math.cos(drift)*8, 400, blob3);
  drawSoftBlob(W*0.1 + Math.cos(drift*0.9)*22, H*0.4 + Math.sin(drift*1.2)*10, 240, blob4);
}

function drawSoftBlob(x, y, r, color) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, color);
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fill();
}

function drawGrass() {
  const grassColor1 = colorAmount < 0.5
    ? `rgba(70,95,90,${0.30 - colorAmount*0.1})`
    : `rgba(200,160,170,${0.20 + colorAmount*0.08})`;
  const grassColor2 = colorAmount < 0.5
    ? `rgba(50,75,70,${0.40 - colorAmount*0.1})`
    : `rgba(180,140,155,${0.25 + colorAmount*0.10})`;

  // Grass sways gently — slowed 5x
  const sway = time * 0.00006;

  ctx.fillStyle = grassColor1;
  ctx.beginPath();
  ctx.moveTo(0, H*0.5);
  for (let x = 0; x <= W; x += 6) {
    ctx.lineTo(x, H*0.5 + Math.sin(x*0.012 + sway)*6 + Math.sin(x*0.04 + sway*1.3)*3);
  }
  ctx.lineTo(W, H*0.5);
  ctx.lineTo(0, H*0.5);
  ctx.fill();

  ctx.fillStyle = grassColor2;
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 6) {
    ctx.lineTo(x, H*0.92 + Math.sin(x*0.008 + sway*0.8)*8 + Math.sin(x*0.05 + sway)*3);
  }
  ctx.lineTo(W, H);
  ctx.fill();
}

const streamLines = [];
for (let i = 0; i < 9; i++) {
  streamLines.push({
    yRatio: 0.55 + (i/9)*0.35,
    amp: 8 + Math.random()*14,
    freq: 0.005 + Math.random()*0.008,
    phase: Math.random()*Math.PI*2,
    width: 0.6 + Math.random()*1.4,
    opacity: 0.18 + Math.random()*0.22,
    idleSpeed: (0.4 + Math.random()*0.6) * (Math.random() < 0.5 ? -1 : 1),
    idlePhase: Math.random()*Math.PI*2,
    idleFreq: 0.00002 + Math.random()*0.00003   // 5x slower than before
  });
}

function drawWaterLines() {
  streamLines.forEach((line) => {
    ctx.strokeStyle = `rgba(255,255,255,${line.opacity * (0.35 + flowAmount*0.65)})`;
    ctx.lineWidth = line.width;
    ctx.lineCap = 'round';
    ctx.beginPath();
    const baseY = H * line.yRatio;
    // active flow speed reduced 5x (0.0006 → 0.00012)
    const idleFlow = Math.sin(time * line.idleFreq + line.idlePhase) * line.idleSpeed;
    const flowSpeed = time * 0.00012 * flowAmount + idleFlow * (1 - flowAmount * 0.7);
    for (let x = 0; x <= W; x += 3) {
      const wave = Math.sin(x*line.freq + flowSpeed*4 + line.phase) * line.amp * (0.35 + flowAmount*0.65);
      // subtle bob slowed 5x
      const subtle = Math.sin(time*0.00008 + line.phase) * 1.5;
      const y = baseY + wave + subtle;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  });
}

const sparkles = [];
for (let i = 0; i < 22; i++) {
  sparkles.push({
    x: Math.random()*1000,
    y: 500 + Math.random()*300,
    vx: 0.4 + Math.random()*1.2,
    vy: (Math.random()-0.5)*0.15,
    r: 0.8 + Math.random()*1.8,
    opacity: 0.3 + Math.random()*0.5,
    twinkle: Math.random()*Math.PI*2
  });
}

function drawSparkles() {
  if (flowAmount < 0.05) return;
  sparkles.forEach((p) => {
    // sparkle drift slowed 5x
    p.x += p.vx*flowAmount*0.2;
    p.y += p.vy*flowAmount*0.2;
    p.twinkle += 0.01;   // 5x slower twinkle
    if (p.x > W+10) {
      p.x = -10;
      p.y = H*(0.55 + Math.random()*0.38);
    }
    if (p.y < H*0.5 || p.y > H*0.95) {
      p.y = H*(0.55 + Math.random()*0.38);
    }
    const tw = (Math.sin(p.twinkle)+1)*0.5;
    ctx.fillStyle = `rgba(255,255,255,${p.opacity*flowAmount*tw})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  });
}

const leaves = [];
for (let i = 0; i < 4; i++) {
  leaves.push({
    x: Math.random()*1000,
    y: 500 + Math.random()*200,
    vx: 0.15 + Math.random()*0.25,
    rot: Math.random()*Math.PI*2,
    rotSpeed: (Math.random()-0.5)*0.005,
    size: 4 + Math.random()*4,
    bobPhase: Math.random()*Math.PI*2,
    bobSpeed: 0.00016 + Math.random()*0.00012  // 5x slower bob
  });
}

function drawLeaves() {
  leaves.forEach((leaf) => {
    // All leaf motion slowed ~5x
    const idleDrift = 0.016;
    leaf.x += (leaf.vx*flowAmount*0.2 + idleDrift*(1-flowAmount));
    leaf.rot += leaf.rotSpeed*flowAmount*0.2 + 0.00016*(1-flowAmount);
    const bobY = Math.sin(time*leaf.bobSpeed + leaf.bobPhase) * 1.5;
    if (leaf.x > W+20) {
      leaf.x = -20;
      leaf.y = H*(0.6 + Math.random()*0.3);
    }
    const r = Math.round(130 + colorAmount*120);
    const g = Math.round(150 - colorAmount*40);
    const b = Math.round(110 + colorAmount*60);
    ctx.save();
    ctx.translate(leaf.x, leaf.y + bobY);
    ctx.rotate(leaf.rot);
    ctx.fillStyle = `rgba(${r},${g},${b},0.55)`;
    ctx.beginPath();
    ctx.ellipse(0, 0, leaf.size, leaf.size*0.4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function loop() {
  const target = isPlaying ? 1 : 0;
  // Flow ramps up reasonably (about 1 second to match user gesture)
  flowAmount += (target - flowAmount)*0.02;
  // Color transition: ~50 seconds from blue to pink at 60fps
  // 50s * 60fps = 3000 frames. Step ~ 1/3000 ≈ 0.00033 per frame for linear.
  // Using smoothing gives the right gentle dawn feel:
  if (isPlaying) {
    colorAmount += (1 - colorAmount) * 0.00075;  // ~50s to reach ~95%
  } else {
    colorAmount += (0 - colorAmount) * 0.02;     // quick reset on stop
  }

  drawBase();
  drawGrass();
  drawWaterLines();
  drawLeaves();
  drawSparkles();

  time += 16;
  requestAnimationFrame(loop);
}
loop();

const audio = document.getElementById('audio');
const listenBtn = document.getElementById('listenBtn');
const stopBtn = document.getElementById('stopBtn');
const whisper = document.getElementById('whisper');

audio.setAttribute('playsinline', '');
audio.setAttribute('webkit-playsinline', '');
audio.muted = false;
audio.volume = 1.0;

const messages = [
  'you are not alone',
  'quietly, i am here',
  'a voice is flowing',
  'it\'s okay'
];
let messageIndex = 0;
let messageTimer = null;

function showNextMessage() {
  whisper.classList.remove('show');
  setTimeout(() => {
    whisper.textContent = messages[messageIndex % messages.length];
    whisper.classList.add('show');
    messageIndex++;
  }, 800);
}

function showError(msg) {
  whisper.textContent = msg;
  whisper.classList.add('show');
}

audio.addEventListener('error', () => {
  const err = audio.error;
  let msg = 'audio file not found — check 0505.mp3';
  if (err) {
    switch (err.code) {
      case 1: msg = 'audio loading aborted'; break;
      case 2: msg = 'network error loading audio'; break;
      case 3: msg = 'audio file is corrupted'; break;
      case 4: msg = 'audio file not found or format unsupported'; break;
    }
  }
  console.error('Audio error:', err);
  showError(msg);
});

// Mobile (esp. iOS): satisfy autoplay policy with a muted play(), then real play on Listen.
// One shared promise so pointerdown and the Listen click never race.
let audioUnlockPromise = null;
function ensureAudioUnlocked() {
  if (audioUnlockPromise) return audioUnlockPromise;
  audioUnlockPromise = (async () => {
    try {
      audio.muted = true;
      await audio.play();
      audio.pause();
      audio.currentTime = 0;
    } catch (_) { /* ignore — Listen will retry */ }
    finally {
      audio.muted = false;
    }
  })();
  return audioUnlockPromise;
}

listenBtn.addEventListener('click', async () => {
  try {
    await ensureAudioUnlocked();
    audio.load();
    audio.currentTime = 0;
    audio.muted = false;
    audio.volume = 1.0;
    const playPromise = audio.play();
    if (playPromise !== undefined) {
      await playPromise;
    }
    isPlaying = true;
    document.body.classList.add('playing');
    listenBtn.classList.add('hidden');
    stopBtn.classList.remove('hidden');
    showNextMessage();
    messageTimer = setInterval(showNextMessage, 8000);
  } catch (e) {
    console.error('Audio playback failed:', e);
    if (e.name === 'NotSupportedError') {
      showError('place 0505.mp3 next to index.html');
    } else if (e.name === 'NotAllowedError') {
      showError('tap once more to begin');
    } else {
      showError('could not play audio');
    }
  }
});

stopBtn.addEventListener('click', () => {
  audio.pause();
  audio.currentTime = 0;
  isPlaying = false;
  document.body.classList.remove('playing');
  stopBtn.classList.add('hidden');
  listenBtn.classList.remove('hidden');
  if (messageTimer) {
    clearInterval(messageTimer);
    messageTimer = null;
  }
  whisper.classList.remove('show');
  setTimeout(() => { whisper.textContent = '　'; }, 1000);
  messageIndex = 0;
});

// Prime iOS/WebKit audio on first touch so Listen's play() is not blocked.
['touchstart', 'pointerdown'].forEach(evt => {
  document.addEventListener(evt, () => { ensureAudioUnlocked(); }, { once: true, passive: true });
});
</script>
</body>
</html>
